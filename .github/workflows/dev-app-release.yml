name: Dev App Release

on:
  workflow_call:
    inputs:
      plan:
        description: "dist plan JSON (passed automatically by cargo-dist; unused here)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build, e.g. 0.1.70"
        required: true

permissions:
  contents: write

concurrency:
  group: dev-app-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac-arm64
            runner: macos-14
            builder_args: "--mac --arm64"
            artifact_glob: "out/*-mac-arm64.zip"
          - platform: linux-x64
            runner: ubuntu-latest
            builder_args: "--linux --x64"
            artifact_glob: "out/*.zip"
          - platform: win-x64
            runner: windows-latest
            builder_args: "--win --x64"
            artifact_glob: "out/*.zip"
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
        working-directory: dev-app
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve tag
        id: tag
        shell: bash
        working-directory: .
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Strip any `v` prefix; tags here are bare semver but stay defensive.
          VERSION="${TAG#v}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"

      # Install BEFORE bumping package.json so --frozen-lockfile sees the
      # original (matching) version. electron-builder reads the post-bump
      # version straight from package.json at packaging time.
      - name: Install
        run: bun install --frozen-lockfile

      - name: Pin dev-app/package.json version to tag
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.tag.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build
        run: bun run build

      - name: Package with electron-builder
        env:
          # Tell electron-builder explicitly: no signing, even if the runner
          # happens to have an Apple Developer keychain laying around.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder ${{ matrix.builder_args }}

      - name: Normalize artifact name to ${{ matrix.platform }}.zip
        run: |
          shopt -s nullglob
          files=( ${{ matrix.artifact_glob }} )
          if [ ${#files[@]} -eq 0 ]; then
            echo "no zip found for ${{ matrix.platform }} (glob: ${{ matrix.artifact_glob }})" >&2
            ls -la out/ || true
            exit 1
          fi
          if [ ${#files[@]} -gt 1 ]; then
            echo "expected exactly one zip, got ${#files[@]}: ${files[@]}" >&2
            exit 1
          fi
          cp "${files[0]}" "${{ matrix.platform }}.zip"
          ls -la "${{ matrix.platform }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: dev-app-${{ matrix.platform }}
          path: dev-app/${{ matrix.platform }}.zip
          if-no-files-found: error

  publish:
    name: upload to R2
    needs: build
    runs-on: ubuntu-latest
    # No `permissions:` block — R2 is the only target; keeping repo-token
    # surface minimal.
    steps:
      - name: Resolve version
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: dev-app-*
          path: artifacts
          merge-multiple: true

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - uses: dopplerhq/cli-action@v3

      # Pull R2 creds from Doppler. They never leave this step's bash
      # subshell — `doppler run` injects them into the wrapped process env
      # and ::add-mask:: redacts them from any accidental log echo.
      - name: Upload dev-app zips to R2
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          doppler run -- bash -c '
            set -euo pipefail
            echo "::add-mask::$CF_R2_WAVEDASH_DEV_APP_TOKEN"
            echo "::add-mask::$CF_ACCOUNT_ID"
            export CLOUDFLARE_API_TOKEN="$CF_R2_WAVEDASH_DEV_APP_TOKEN"
            export CLOUDFLARE_ACCOUNT_ID="$CF_ACCOUNT_ID"
            for f in artifacts/*.zip; do
              bunx wrangler@latest r2 object put \
                "$CF_R2_WAVEDASH_DEV_APP_BUCKET/$VERSION/$(basename "$f")" \
                --file="$f" --remote
            done
          '
