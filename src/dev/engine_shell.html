<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Wavedash Dev</title>
		<style>
			html,
			body {
				height: 100%;
				margin: 0;
				background: #000;
			}
			#wavedash-target {
				position: fixed;
				inset: 0;
			}
		</style>
		<!-- Same pair injected into custom HTML games: parser-blocking SDK
		     bundle (window.Wavedash before anything else), then the init gate. -->
		<script src="{{INJECT_URL}}" crossorigin="anonymous"></script>
		<script src="/__wavedash/dev.js"></script>
		<script>
			// Same contract as play's embed shell: the default entrypoint below
			// reads these and boots the engine into #wavedash-target.
			window.entrypointParams = {{ENTRYPOINT_PARAMS}};
		</script>
	</head>
	<body>
		<div id="wavedash-target"></div>
		<!-- Play's real default entrypoint for this engine/version — the exact
		     script prod uses to boot the engine, served by the play worker.
		     On load failure (e.g. unsupported engine version → 404) the gate
		     shows the resolver's message instead of spinning forever. -->
		<script src="{{ENTRYPOINT_URL}}" onerror="__wavedashEntrypointError(this.src)"></script>
	</body>
</html>
