<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="color-scheme" content="light dark" />
		<title>Wavedash Dev</title>
		<style>
			html,
			body {
				height: 100%;
				margin: 0;
			}
			/* Engine entrypoints boot into this target (play's embed contract).
			   While empty it must not paint or steal clicks, but visibility (not
			   display) keeps its dimensions measurable for pre-mount sizing. */
			#wavedash-target {
				position: fixed;
				inset: 0;
				background: #000;
			}
			#wavedash-target:empty {
				visibility: hidden;
			}
		</style>
		<!-- Parser-blocking SDK bundle then init gate — the same pair injected
		     into custom HTML games. -->
		<script src="{{INJECT_URL}}" crossorigin="anonymous"></script>
		<script src="/__wavedash/dev.js"></script>
		<script>
			// Play's embed-shell contract; null when the entry is the game's own script.
			window.entrypointParams = {{ENTRYPOINT_PARAMS}};
		</script>
	</head>
	<body>
		<div id="wavedash-target"></div>
		<!-- Play's real default entrypoint (engine builds) or the game's own .js
		     entry. On load failure the gate shows the error instead of spinning. -->
		<script src="{{SCRIPT_SRC}}" onerror="__wavedashEntrypointError(this.src)"></script>
	</body>
</html>
